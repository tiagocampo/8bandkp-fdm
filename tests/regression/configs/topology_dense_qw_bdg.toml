# Issue 05 / U7: dense-QW BdG rung end-to-end certification.
#
# Mirrors the wire_inas_gaas_bdg_topological.toml physics intent (mu at the
# conduction subband edge + transverse B_vec activates Peierls orbital
# coupling + Zeeman) but on a 8N x 8N / 16N x 16N dense quantum-well
# Hamiltonian. Even fd_step (>= 6) is required so k_par = pi/a is a real
# PHS-invariant TRIM point (Issue 01 AC).
#
# Material: InAsW (Winkler parameter set; SC minigap tunable via delta_0).
# fd_step = 8 (even; keeps the 16N=128 BdG matrix cheap for the B-sweep).
# The verifier drives a B sweep [0, 4] T in 0.5 T steps by overriding
# B_vec = [Bx, 0, 0] in the verifier; the .toml default is Bx=0.
confinement = "qw"
FDorder = 2
fd_step = 8

[wave_vector]
mode = "k0"
max = 0.0
nsteps = 1

[bands]
num_cb = 4
num_vb = 8

[[material]]
name = "InAsW"
z_min = -30
z_max = 30

[topology]
mode = "bdg"
compute_chern = false
compute_hall = false
qwz_u = 0.0
compute_z2 = false
extract_edge_states = true
edge_E_window = 0.01
compute_ldos = false
ldos_eta = 0.001
ldos_E_range = [-0.1, 0.1]
ldos_num_E = 20

[bdg]
mu = 0.057
delta_0 = 0.0005
g_factor = 6.0
B_vec = [0.0, 0.0, 0.0]
gauge = "landau"
kz = 0.0
self_consistent = false