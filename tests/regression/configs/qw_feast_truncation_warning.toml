# QW FEAST config that triggers the truncation warning.
#
# The FEAST energy window [-0.5, 1.5] (the same window used by
# QW_FASTPATH_CONFIG / verify_qw_sparse_solver) spans far more subbands of
# this GaAs/AlGaAs QW than the requested band window retains: FEAST returns
# ~38 eigenvalues at k_par=0 while only num_cb + num_vb = 12 are retained.
# That exercises the "only the lowest will be kept" branch in main.f90
# (QW FEAST k-sweep truncation warning).
#
# Retained bands are sized so the default FEAST subspace M0 = 2*nev = 24
# retries up to 48 and converges (the ~38 eigenvalues fit), i.e. this is the
# same proven-converging parameter set as the fast-path equivalence config.
#
# COVERAGE: observable=truncation_warning geometry=qw material=GaAs

confinement = "qw"
FDorder = 2
fd_step = 41

[wave_vector]
mode = "kx"
max = 0.1
nsteps = 3

[bands]
num_cb = 4
num_vb = 8

[[material]]
name = "Al30Ga70As"
z_min = -200
z_max = 200

[[material]]
name = "GaAs"
z_min = -50
z_max = 50

[solver]
method = "FEAST"
mode = "ENERGY"
emin = -0.5
emax = 1.5
